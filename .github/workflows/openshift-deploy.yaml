name: OpenShift CI/CD Pipeline

# O pipeline será disparado automaticamente a cada push na branch main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Faz o checkout do seu código no runner do GitHub
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Configura o Java 17 para rodar os testes unitários antes do deploy
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Roda os testes do seu projeto (Garante que código quebrado não vai para produção!)
    - name: Run Maven Unit Tests
      run: mvn test -Dmaven.test.failure.ignore=false

    # 4. Instala a CLI do OpenShift (oc) no ambiente do GitHub
    - name: Install OpenShift CLI (oc)
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: "latest"

    # 5. Faz a autenticação segura no cluster usando os Secrets configurados
    - name: Log in to OpenShift Sandbox
      uses: redhat-actions/oc-login@v1
      with:
        openshift_server: ${{ secrets.OPENSHIFT_SERVER }}
        openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        # Altera automaticamente para o seu namespace/projeto do Sandbox
        namespace: pedro-sbarainicordei-dev

    # 6. Dispara o Build automatizado no OpenShift (Tekton/S2I) puxando a alteração
    - name: Trigger OpenShift Build & Rollout
      run: |
        echo "Disparando a esteira interna do OpenShift..."
        # Puxa o código novo e inicia a compilação oficial do container
        oc start-build retail-analytics --follow
        
        echo "Monitorando a estabilidade do Rollout..."
        # Aguarda o novo Pod passar nos health checks e ficar pronto
        oc rollout status deployment/retail-analytics --timeout=150s