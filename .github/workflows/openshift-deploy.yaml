name: OpenShift CI/CD Pipeline

# Disparado automaticamente a cada push na branch main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      # 1. Checkout do código
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Instala o oc CLI
      - name: Install OpenShift CLI (oc)
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "latest"

      # 3. Login no OpenShift Sandbox
      - name: Log in to OpenShift Sandbox
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: pedro-sbarainicordei-dev

      # 4. Dispara a Pipeline Tekton com volumeClaimTemplate
      # CORRECAO: emptyDir nao compartilha arquivos entre tasks.
      # volumeClaimTemplate cria um PVC real compartilhado por todas as tasks.
      - name: Trigger Tekton Pipeline
        run: |
          echo "Criando PipelineRun com volumeClaimTemplate..."
          oc create -f - <<EOF
          apiVersion: tekton.dev/v1
          kind: PipelineRun
          metadata:
            generateName: retail-analytics-run-
            namespace: pedro-sbarainicordei-dev
          spec:
            pipelineRef:
              name: retail-analytics-pipeline
            params:
              - name: GIT_URL
                value: https://github.com/cordeirops/retail-analytics
              - name: GIT_REVISION
                value: main
            workspaces:
              - name: source-code
                volumeClaimTemplate:
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 500Mi
          EOF

      # 5. Aguarda e exibe o resultado
      - name: Wait and show PipelineRun status
        run: |
          echo "Aguardando PipelineRun iniciar..."
          sleep 10

          RUN=$(oc get pipelineruns --sort-by='.metadata.creationTimestamp' \
            -o jsonpath='{.items[-1].metadata.name}')
          echo "PipelineRun criado: $RUN"

          echo "Acompanhando execucao (timeout 10min)..."
          oc wait pipelinerun/$RUN \
            --for=condition=Succeeded \
            --timeout=600s \
            && echo "Pipeline concluida com SUCESSO!" \
            || (echo "Pipeline FALHOU. Logs:" && \
                oc get pipelinerun/$RUN -o jsonpath='{.status.conditions[0].message}' && \
                exit 1)