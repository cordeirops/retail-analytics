name: OpenShift CI/CD Pipeline

# O pipeline será disparado automaticamente a cada push na branch main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Faz o checkout do seu código no runner do GitHub
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Configura o Java 17 para rodar os testes unitários antes do deploy
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Roda os testes do seu projeto (Garante que código quebrado não vai para produção!)
    - name: Run Maven Unit Tests
      run: mvn test -Dmaven.test.failure.ignore=false

    # 4. Instala a CLI do OpenShift (oc) no ambiente do GitHub
    - name: Install OpenShift CLI (oc)
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: "latest"

    # 5. Faz a autenticação segura no cluster usando os Secrets configurados
    - name: Log in to OpenShift Sandbox
      uses: redhat-actions/oc-login@v1
      with:
        openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
        openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
        # Altera automaticamente para o seu namespace/projeto do Sandbox
        namespace: pedro-sbarainicordei-dev

    # 6. Cria o PipelineRun apontando para o PVC real existente no Sandbox
    - name: Trigger OpenShift Tekton Pipeline
      run: |
        echo "Injetando o PipelineRun diretamente na API do Tekton..."
        
        oc create -f - <<EOF
        apiVersion: tekton.dev/v1
        kind: PipelineRun
        metadata:
          generateName: retail-analytics-run-
          namespace: pedro-sbarainicordei-dev
        spec:
          pipelineRef:
            name: retail-analytics-pipeline
          workspaces:
            - name: source-code
              persistentVolumeClaim:
                # CORREÇÃO AQUI: Alinhando com o recurso real do cluster
                claimName: retail-analytics-pvc-data
        EOF
        
        echo "Aguardando o registro do PipelineRun..."
        sleep 5
        
        echo "Última execução registrada no cluster:"
        oc get pipelineruns.tekton.dev --sort-by='.metadata.creationTimestamp' | tail -n 1