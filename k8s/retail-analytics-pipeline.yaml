apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  labels:
    app: retail-analytics
spec:
  params:
    - name: url
      type: string
    - name: revision
      default: main
  workspaces:
    - name: output
  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -e
        git clone --depth=1 --branch=$(params.revision) $(params.url) $(workspaces.output.path)
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: openshift-rollout
  labels:
    app: retail-analytics
spec:
  params:
    - name: DEPLOYMENT_NAME
      default: quarkus-retail-analytics-git
  steps:
    - name: trigger-rollout
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/usr/bin/env bash
        set -e
        echo "Iniciando atualização controlada do deployment..."
        oc rollout restart deployment/$(params.DEPLOYMENT_NAME)
        oc rollout status deployment/$(params.DEPLOYMENT_NAME) --timeout=150s
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: retail-analytics-pipeline
  labels:
    app: retail-analytics
spec:
  params:
    - name: GIT_URL
      default: https://github.com/cordeirops/retail-analytics
    - name: GIT_REVISION
      default: main
    - name: DEPLOYMENT_NAME
      default: quarkus-retail-analytics-git
  workspaces:
    - name: source-code
  tasks:
    - name: git-clone
      taskRef:
        kind: Task
        name: git-clone
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)
      workspaces:
        - name: output
          workspace: source-code

    - name: deploy-and-verify
      taskRef:
        kind: Task
        name: openshift-rollout
      runAfter: [git-clone]
      params:
        - name: DEPLOYMENT_NAME
          value: $(params.DEPLOYMENT_NAME)