apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: clone-and-test
  namespace: pedro-sbarainicordei-dev
spec:
  workspaces:
    - name: source
  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        echo "=== [PASSO 1] CLONANDO REPOSITÓRIO ==="
        rm -rf ..?* .[!.]* *
        git clone --depth=1 https://github.com/cordeirops/retail-analytics .
        echo "=== CONTEÚDO CLONADO COM SUCESSO ==="
        ls -la
    - name: run-tests
      image: registry.access.redhat.com/ubi8/openjdk-17:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        echo "=== [PASSO 2] EXECUTANDO TESTES UNITÁRIOS COM MAVEN ==="
        mvn test -Dmaven.test.failure.ignore=false
      env:
        - name: MAVEN_OPTS
          value: "-Xmx512m -Xms256m"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: openshift-start-build
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: BUILD_CONFIG_NAME
      default: retail-analytics
      type: string
  steps:
    - name: start-build
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        echo "=== [PASSO 3] INICIANDO BUILD S2I NO OPENSHIFT ==="
        oc start-build $(params.BUILD_CONFIG_NAME) --wait
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-deploy
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: DEPLOYMENT_NAME
      default: retail-analytics
      type: string
    - name: ROUTE_NAME
      default: retail-analytics
      type: string
  steps:
    - name: verify
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        echo "=== [PASSO 4] VERIFICANDO STATUS DO DEPLOYMENT ==="
        oc rollout status deployment/$(params.DEPLOYMENT_NAME) --timeout=120s
        ROUTE=$(oc get route $(params.ROUTE_NAME) -o jsonpath='{.spec.host}')
        echo "=== TESTANDO ENDPOINT EM http://$ROUTE ==="
        curl -sf http://$ROUTE/q/health/live
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: retail-analytics-pipeline
  namespace: pedro-sbarainicordei-dev
spec:
  workspaces:
    - name: source-code
  tasks:
    - name: clone-and-test
      taskRef:
        kind: Task
        name: clone-and-test
      workspaces:
        - name: source
          workspace: source-code

    - name: build-image
      taskRef:
        kind: Task
        name: openshift-start-build
      runAfter:
        - clone-and-test

    - name: verify-deploy
      taskRef:
        kind: Task
        name: verify-deploy
      runAfter:
        - build-image