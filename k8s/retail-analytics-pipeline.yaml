apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: retail-analytics-pipeline
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: GIT_URL
      default: https://github.com/cordeirops/retail-analytics
      type: string
  workspaces:
    - name: source-code
  tasks:
    # AQUI ESTÁ O SEGREDO: Usar a Task nativa do cluster que espera a escrita terminar
    - name: git-clone
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: main
      workspaces:
        - name: output
          workspace: source-code

    - name: unit-tests
      taskRef:
        kind: Task
        name: maven-test
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source-code

    - name: build-image
      taskRef:
        kind: Task
        name: openshift-start-build
      runAfter:
        - unit-tests

    - name: verify-deploy
      taskRef:
        kind: Task
        name: verify-deploy
      runAfter:
        - build-image
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-test
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: MAVEN_IMAGE
      default: registry.access.redhat.com/ubi8/openjdk-17:latest
      type: string
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: $(params.MAVEN_IMAGE)
      workingDir: $(workspaces.source.path)
      command: ["mvn"]
      args: ["test", "-Dmaven.test.failure.ignore=false"]
      env:
        - name: MAVEN_OPTS
          value: "-Xmx512m -Xms256m"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: openshift-start-build
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: BUILD_CONFIG_NAME
      default: retail-analytics
      type: string
  steps:
    - name: start-build
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        oc start-build $(params.BUILD_CONFIG_NAME) --wait
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-deploy
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: DEPLOYMENT_NAME
      default: retail-analytics
      type: string
    - name: ROUTE_NAME
      default: retail-analytics
      type: string
  steps:
    - name: verify
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        oc rollout status deployment/$(params.DEPLOYMENT_NAME) --timeout=120s
        ROUTE=$(oc get route $(params.ROUTE_NAME) -o jsonpath='{.spec.host}')
        curl -sf http://$ROUTE/q/health/live