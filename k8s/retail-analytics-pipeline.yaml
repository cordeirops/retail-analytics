# =====================================================
# Task 1: git-clone inline
# =====================================================
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  labels:
    app: retail-analytics
spec:
  params:
    - name: url
      type: string
    - name: revision
      default: main
  workspaces:
    - name: output
  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -e
        echo "Cloning $(params.url)@$(params.revision)"
        git clone --depth=1 --branch=$(params.revision) $(params.url) $(workspaces.output.path)
        echo "Clone complete"
        ls $(workspaces.output.path)
---
# =====================================================
# Task 2: maven-test
# =====================================================
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-test
  labels:
    app: retail-analytics
spec:
  params:
    - name: MAVEN_IMAGE
      default: registry.access.redhat.com/ubi8/openjdk-17:latest
  workspaces:
    - name: source
  steps:
    - name: run-tests
      image: $(params.MAVEN_IMAGE)
      workingDir: $(workspaces.source.path)
      command: ["mvn"]
      args: ["test", "-Dmaven.test.failure.ignore=false"]
      env:
        - name: MAVEN_OPTS
          value: "-Xmx512m -Xms256m"
---
# =====================================================
# Task 3: openshift-start-build
# =====================================================
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: openshift-start-build
  labels:
    app: retail-analytics
spec:
  params:
    - name: BUILD_CONFIG_NAME
      default: retail-analytics
  steps:
    - name: start-build
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/usr/bin/env bash
        set -e
        echo "Starting S2I build: $(params.BUILD_CONFIG_NAME)"
        oc start-build $(params.BUILD_CONFIG_NAME) --wait
        echo "Build completed successfully"
---
# =====================================================
# Task 4: verify-deploy
# =====================================================
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-deploy
  labels:
    app: retail-analytics
spec:
  params:
    - name: DEPLOYMENT_NAME
      default: retail-analytics
    - name: ROUTE_NAME
      default: retail-analytics
  steps:
    - name: verify
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/usr/bin/env bash
        set -e
        echo "Waiting for rollout..."
        oc rollout status deployment/$(params.DEPLOYMENT_NAME) --timeout=120s
        ROUTE=$(oc get route $(params.ROUTE_NAME) -o jsonpath='{.spec.host}')
        echo "Application available at: http://$ROUTE"
        echo "Testing health endpoint..."
        sleep 10
        curl -sf http://$ROUTE/q/health/live && echo "Health check PASSED" || echo "Health check pending"
---
# =====================================================
# Pipeline
# =====================================================
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: retail-analytics-pipeline
  labels:
    app: retail-analytics
spec:
  params:
    - name: GIT_URL
      default: https://github.com/cordeirops/retail-analytics
    - name: GIT_REVISION
      default: main
    - name: BUILD_CONFIG_NAME
      default: retail-analytics
    - name: DEPLOYMENT_NAME
      default: retail-analytics
  workspaces:
    - name: source-code
  tasks:
    - name: git-clone
      taskRef:
        kind: Task
        name: git-clone
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)
      workspaces:
        - name: output
          workspace: source-code

    - name: unit-tests
      taskRef:
        kind: Task
        name: maven-test
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: source-code

    - name: build-image
      taskRef:
        kind: Task
        name: openshift-start-build
      runAfter: [unit-tests]
      params:
        - name: BUILD_CONFIG_NAME
          value: $(params.BUILD_CONFIG_NAME)

    - name: verify-deploy
      taskRef:
        kind: Task
        name: verify-deploy
      runAfter: [build-image]
      params:
        - name: DEPLOYMENT_NAME
          value: $(params.DEPLOYMENT_NAME)
        - name: ROUTE_NAME
          value: $(params.DEPLOYMENT_NAME)