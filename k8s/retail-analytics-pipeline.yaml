# =====================================================
# Pipeline Tekton — retail-analytics
# Namespace: pedro-sbarainicordei-dev
# =====================================================

# ── RoleBinding: SA 'pipeline' pode executar oc start-build ──
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-can-build
  namespace: pedro-sbarainicordei-dev
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: pedro-sbarainicordei-dev
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
# ── Task 1: git-clone ──
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: url
      type: string
    - name: revision
      type: string
      default: main
  workspaces:
    - name: output
  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -e
        WORKSPACE=$(workspaces.output.path)
        echo "=== Workspace: $WORKSPACE ==="
        rm -rf $WORKSPACE/* $WORKSPACE/.[!.]* 2>/dev/null || true
        git clone --depth=1 --branch=$(params.revision) $(params.url) $WORKSPACE
        echo "=== Conteudo clonado: ==="
        ls -la $WORKSPACE
---
# ── Task 2: maven-test ──
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-test
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: MAVEN_IMAGE
      default: registry.access.redhat.com/ubi8/openjdk-17:latest
      type: string
  workspaces:
    - name: source
  stepTemplate:
    env:
      - name: MAVEN_OPTS
        value: "-Xmx512m -Xms256m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"
      - name: MAVEN_CONFIG
        value: ""
  steps:
    - name: run-tests
      image: $(params.MAVEN_IMAGE)
      workingDir: $(workspaces.source.path)
      timeout: 10m
      command: ["mvn"]
      args:
        - "test"
        - "-Dmaven.test.failure.ignore=false"
        - "-Dquarkus.test.continuous-testing=disabled"
        - "--no-transfer-progress"
        - "-B"
---
# ── Task 3: openshift-start-build ──
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: openshift-start-build
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: BUILD_CONFIG_NAME
      default: retail-analytics
      type: string
  steps:
    - name: start-build
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        set -e
        echo "=== Verificando BuildConfig $(params.BUILD_CONFIG_NAME) ==="
        oc get bc $(params.BUILD_CONFIG_NAME) || {
          echo "ERRO: BuildConfig nao encontrado."
          echo "Execute: oc new-app java:openjdk-17-ubi8~https://github.com/cordeirops/retail-analytics --name=retail-analytics"
          exit 1
        }
        echo "=== Iniciando build S2I ==="
        oc start-build $(params.BUILD_CONFIG_NAME) --wait --follow
        echo "=== Build concluido com sucesso ==="
---
# ── Task 4: verify-deploy ──
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-deploy
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: DEPLOYMENT_NAME
      default: retail-analytics
      type: string
    - name: ROUTE_NAME
      default: retail-analytics
      type: string
  steps:
    - name: verify
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      script: |
        #!/bin/sh
        set -e
        echo "=== Aguardando rollout do deployment ==="
        oc rollout status deployment/$(params.DEPLOYMENT_NAME) --timeout=120s

        echo "=== Obtendo URL da Route ==="
        ROUTE=$(oc get route $(params.ROUTE_NAME) -o jsonpath='{.spec.host}')
        echo "URL: http://$ROUTE"

        echo "=== Aguardando Quarkus inicializar (15s) ==="
        sleep 15

        echo "=== Testando health endpoint com retry ==="
        for i in 1 2 3 4 5; do
          echo "Tentativa $i/5..."
          if curl -sf --max-time 10 http://$ROUTE/q/health/live; then
            echo ""
            echo "=== Health check OK! Aplicacao esta no ar. ==="
            exit 0
          fi
          echo "Aguardando 10s..."
          sleep 10
        done

        echo "AVISO: Health check nao respondeu apos 5 tentativas."
        echo "Verifique os logs: oc logs deployment/$(params.DEPLOYMENT_NAME)"
        exit 1
---
# ── Pipeline principal ──
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: retail-analytics-pipeline
  namespace: pedro-sbarainicordei-dev
spec:
  params:
    - name: GIT_URL
      default: https://github.com/cordeirops/retail-analytics
      type: string
    - name: GIT_REVISION
      default: main
      type: string
    - name: BUILD_CONFIG_NAME
      default: retail-analytics
      type: string
    - name: DEPLOYMENT_NAME
      default: retail-analytics
      type: string
  workspaces:
    - name: source-code
  tasks:
    - name: git-clone
      taskRef:
        kind: Task
        name: git-clone
      params:
        - name: url
          value: $(params.GIT_URL)
        - name: revision
          value: $(params.GIT_REVISION)
      workspaces:
        - name: output
          workspace: source-code

    - name: unit-tests
      taskRef:
        kind: Task
        name: maven-test
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source-code

    - name: build-image
      taskRef:
        kind: Task
        name: openshift-start-build
      runAfter:
        - unit-tests
      params:
        - name: BUILD_CONFIG_NAME
          value: $(params.BUILD_CONFIG_NAME)

    - name: verify-deploy
      taskRef:
        kind: Task
        name: verify-deploy
      runAfter:
        - build-image
      params:
        - name: DEPLOYMENT_NAME
          value: $(params.DEPLOYMENT_NAME)
        - name: ROUTE_NAME
          value: $(params.DEPLOYMENT_NAME)