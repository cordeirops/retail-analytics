# =====================================================
# Aplicação
# =====================================================
quarkus.application.name=retail-analytics
quarkus.application.version=1.0.0

# =====================================================
# HTTP
# =====================================================
quarkus.http.port=8080
# Necessário para o S2I e OpenShift — aceita conexões de fora do pod
quarkus.http.host=0.0.0.0

# =====================================================
# OpenShift (extensão quarkus-openshift)
# Gera automaticamente: Deployment, Service, Route, ImageStream
# =====================================================
quarkus.openshift.route.expose=true
quarkus.openshift.route.tls.termination=edge

# Recursos do container — adequado para o Sandbox (quota: 3 cores / 14GB)
quarkus.openshift.resources.requests.cpu=100m
quarkus.openshift.resources.requests.memory=256Mi
quarkus.openshift.resources.limits.cpu=500m
quarkus.openshift.resources.limits.memory=512Mi

# Liveness e Readiness probes (usa os endpoints do smallrye-health)
quarkus.openshift.liveness-probe.http-action-path=/q/health/live
quarkus.openshift.liveness-probe.initial-delay=10
quarkus.openshift.liveness-probe.period=30
quarkus.openshift.readiness-probe.http-action-path=/q/health/ready
quarkus.openshift.readiness-probe.initial-delay=5
quarkus.openshift.readiness-probe.period=10

# Número de réplicas inicial
quarkus.openshift.replicas=1

# Labels para organização no console OpenShift
quarkus.openshift.labels.app=retail-analytics
quarkus.openshift.labels.version=1.0.0
quarkus.openshift.labels.component=backend

# =====================================================
# Health (SmallRye)
# =====================================================
quarkus.smallrye-health.root-path=/q/health

# =====================================================
# Métricas Prometheus
# =====================================================
quarkus.micrometer.export.prometheus.path=/q/metrics

# =====================================================
# Logging
# =====================================================
quarkus.log.level=INFO
quarkus.log.category."dev.pedro.tam".level=DEBUG
